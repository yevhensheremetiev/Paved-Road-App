name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  verify:
    name: Quality gates
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: paved_road
          POSTGRES_PASSWORD: paved_road
          POSTGRES_DB: paved_road_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U paved_road -d paved_road_dev"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://paved_road:paved_road@localhost:5432/paved_road_dev?schema=public

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply database migrations
        run: pnpm prisma:migrate:deploy

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Generate Prisma Client
        run: pnpm prisma:generate

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Validate Prisma schema
        run: pnpm prisma:validate

      - name: Test
        run: pnpm test
