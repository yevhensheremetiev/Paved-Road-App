name: Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Migrate and smoke test
    runs-on: ubuntu-latest
    environment: prod

    env:
      AMPLIFY_DEPLOY_HOOK_URL: ${{ secrets.AMPLIFY_DEPLOY_HOOK_URL }}
      API_URL: ${{ secrets.API_URL }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm prisma:generate

      - name: Deploy database migrations
        run: pnpm prisma:migrate:deploy

      - name: Trigger Render deploy hook
        if: env.RENDER_DEPLOY_HOOK_URL != ''
        run: curl --fail --request POST "$RENDER_DEPLOY_HOOK_URL"

      - name: Trigger Amplify deploy hook
        if: env.AMPLIFY_DEPLOY_HOOK_URL != ''
        run: curl --fail --request POST "$AMPLIFY_DEPLOY_HOOK_URL"

      - name: Smoke test API health
        run: |
          for attempt in {1..12}; do
            if curl --fail --silent --show-error "$API_URL/health"; then
              exit 0
            fi

            echo "Health check failed on attempt ${attempt}; retrying..."
            sleep 10
          done

          echo "API health check failed after retries."
          exit 1
