services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: paved_road
      POSTGRES_PASSWORD: paved_road
      POSTGRES_DB: paved_road_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paved_road -d paved_road_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
